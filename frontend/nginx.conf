server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # API → backend container
    location /api/ {
        proxy_pass http://backend:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Uploads → backend container
    location /uploads/ {
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
    }

    # Static assets — return real 404 if missing (don't fall back to index.html
    # which would let browsers cache HTML as an image and break later updates).
    location ~* \.(webp|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot|css|js|map)$ {
        try_files $uri =404;
    }

    # SPA fallback — no $uri/ to avoid directory conflicts (e.g. /characters/)
    location / {
        try_files $uri /index.html;
    }
}
