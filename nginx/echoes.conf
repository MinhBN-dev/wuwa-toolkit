server {
    listen 80;
    server_name echoes.local;

    # Frontend (Vite dev server handles /api proxy internally)
    location / {
        proxy_pass http://172.30.58.127:5174;
        proxy_http_version 1.1;

        # WebSocket support (Vite HMR)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend API (direct proxy, bypass Vite)
    location /api/ {
        proxy_pass http://172.30.58.127:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Uploads
    location /uploads/ {
        proxy_pass http://172.30.58.127:8001;
        proxy_set_header Host $host;
    }
}
