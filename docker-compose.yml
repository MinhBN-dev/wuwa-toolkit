services:
  postgres:
    image: postgres:16-alpine
    container_name: echoes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: echoes_optimizer
      POSTGRES_USER: ${POSTGRES_USER:-echoes_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-echoes_user} -d echoes_optimizer"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: echoes-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-echoes_user}:${POSTGRES_PASSWORD}@postgres:5432/echoes_optimizer
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      UPLOAD_DIR: /app/uploads
      DATA_DIR: /app/data
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
    volumes:
      - uploads:/app/uploads
      - evc_state:/app/data
    networks:
      - internal

  frontend:
    build: ./frontend
    container_name: echoes-frontend
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  uploads:
  evc_state:
